<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="app.brand">Gemenskap</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <script src="/js/font-size.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/user-storage.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/components.js"></script>

  <main class="container container-landing" id="main">
    <section class="hero">
      <span class="hero-icon" aria-hidden="true">&#127793;</span>
      <h1 data-i18n="landing.title">Hitta nya v&auml;nner och aktiviteter</h1>
      <p data-i18n="landing.subtitle"></p>
    </section>

    <ul class="feature-list">
      <li data-i18n="landing.feature1"></li>
      <li data-i18n="landing.feature2"></li>
      <li data-i18n="landing.feature3"></li>
    </ul>

    <div class="btn-row" style="margin-top:28px;">
      <a href="/login.html" class="btn btn-lg" data-i18n="landing.cta_login">Logga in eller skapa konto</a>
    </div>

    <p class="landing-reassurance" data-i18n="landing.reassurance"></p>
  </main>

  <script>
    window.UI.renderHeader({ loggedIn: false });
    (async () => {
      const u = await window.Auth.getCurrentUser();
      if (u && u.display_name && u.city) window.location.href = '/home.html';
      else if (u) window.location.href = '/onboarding.html';
    })();
  </script>
</body>
</html>
